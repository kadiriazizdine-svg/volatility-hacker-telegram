<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volatilityhacker_ACADEMY</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(180,0,0,0.18) 0%, transparent 70%),
                  radial-gradient(ellipse 60% 40% at 50% 100%, rgba(120,0,0,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: linear-gradient(160deg, #1a0000 0%, #0d0d0d 40%, #1a0000 100%);
      border: 1px solid rgba(200, 0, 0, 0.25);
      border-radius: 24px;
      padding: 48px 36px 52px;
      max-width: 480px;
      width: 92%;
      text-align: center;
      box-shadow:
        0 0 60px rgba(180,0,0,0.2),
        0 0 120px rgba(100,0,0,0.1),
        inset 0 1px 0 rgba(255,255,255,0.05);
      animation: cardIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Top red line accent */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #cc0000, #ff3333, #cc0000, transparent);
      border-radius: 2px;
      animation: lineGlow 3s ease-in-out infinite alternate;
    }

    @keyframes lineGlow {
      from { opacity: 0.6; filter: blur(0px); }
      to   { opacity: 1; filter: blur(1px); }
    }

    /* Logo */
    .logo-wrap {
      margin: 0 auto 28px;
      width: 150px;
      height: 150px;
      position: relative;
      animation: logoIn 0.9s cubic-bezier(0.22,1,0.36,1) 0.15s both;
    }

    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.7) rotate(-8deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .logo-wrap::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,0,0,0.3) 0%, transparent 70%);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%       { transform: scale(1.08); opacity: 1; }
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 0 16px rgba(200,0,0,0.5));
    }

    /* Title */
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px, 7vw, 38px);
      letter-spacing: 2px;
      color: #ffffff;
      text-shadow: 0 0 30px rgba(220,0,0,0.4);
      margin-bottom: 32px;
      line-height: 1.1;
      animation: fadeUp 0.7s ease 0.3s both;
    }

    .title span {
      color: #cc0000;
    }

    /* Bullet points */
    .bullets {
      list-style: none;
      margin-bottom: 36px;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bullets li {
      font-size: clamp(14px, 3.8vw, 16px);
      font-weight: 600;
      color: #e8e8e8;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(200,0,0,0.15);
      border-radius: 10px;
      transition: border-color 0.3s, background 0.3s;
      animation: fadeUp 0.6s ease both;
    }

    .bullets li:nth-child(1) { animation-delay: 0.4s; }
    .bullets li:nth-child(2) { animation-delay: 0.5s; }
    .bullets li:nth-child(3) { animation-delay: 0.6s; }
    .bullets li:nth-child(4) { animation-delay: 0.7s; }

    .bullets li:hover {
      border-color: rgba(200,0,0,0.5);
      background: rgba(200,0,0,0.07);
    }

    .bullets li .emoji {
      font-size: 20px;
      flex-shrink: 0;
    }

    /* CTA Button */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px 28px;
      background: linear-gradient(135deg, #cc0000 0%, #ff2222 50%, #cc0000 100%);
      background-size: 200% 200%;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: clamp(14px, 3.8vw, 17px);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 60px;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 4px 30px rgba(200,0,0,0.5),
        0 0 60px rgba(200,0,0,0.2),
        inset 0 1px 0 rgba(255,255,255,0.2);
      animation: fadeUp 0.7s ease 0.8s both, gradientShift 3s ease infinite;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }

    .cta-btn::before {
      content: '';
      position: absolute;
      top: -50%; left: -60%;
      width: 40%; height: 200%;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.25) 50%, transparent 60%);
      transform: skewX(-15deg);
      animation: shine 3s ease-in-out infinite;
    }

    @keyframes shine {
      0%   { left: -60%; opacity: 0; }
      20%  { opacity: 1; }
      40%  { left: 130%; opacity: 0; }
      100% { left: 130%; opacity: 0; }
    }

    .cta-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow:
        0 8px 40px rgba(200,0,0,0.7),
        0 0 80px rgba(200,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .cta-btn:active {
      transform: translateY(0) scale(0.99);
    }

    .cta-btn svg {
      width: 22px;
      height: 22px;
      fill: white;
      flex-shrink: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #cc0000, transparent);
      margin: 0 auto 28px;
      animation: fadeUp 0.6s ease 0.35s both;
    }
  </style>
</head>
